# OpenSpec Configuration — bazar-pos
# Auto-generated by sdd-init on 2026-06-17
# Mode: hybrid (openspec + Engram)

context: |
  Multi-store POS desktop application (Tauri v2 + React 18).
  Offline-first with cloud sync (SQLite local, PostgreSQL cloud via Neon).
  Drizzle ORM schema. Zustand stores. Tailwind CSS dark/light theme.
  Stores scoped by store_id. Admin mode with PIN protection.

strict_tdd: true

testing:
  runner:
    command: pnpm test
    framework: vitest
    watch: pnpm test:watch
    environment: jsdom
    globals: true
    setup_file: src/__tests__/setup.ts
  layers:
    unit:
      available: true
      tool: vitest + testing-library/react
    integration:
      available: true
      tool: vitest + testing-library (mock Tauri invoke)
    e2e:
      available: false
      tool: — (Tauri desktop — manual tests)
  coverage:
    available: true
    command: vitest --coverage
  quality:
    linter:
      available: false
      command: —
    type_checker:
      available: true
      command: tsc --noEmit
    formatter:
      available: false
      command: —

phases:
  proposal:
    prompt: openspec/changes/{change}/proposal.md
  spec:
    prompt: openspec/changes/{change}/spec.md
  design:
    prompt: openspec/changes/{change}/design.md
  tasks:
    prompt: openspec/changes/{change}/tasks.md
  apply:
    track: true
  verify:
    command: pnpm test
    report: openspec/changes/{change}/verify-report.md
  archive:
    target: openspec/changes/archive/

plugins:
  - skill-registry
